name: Build
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Setup Theos
        run: |
          sudo apt-get install fakeroot
          export THEOS=~/theos
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/sdks/master/install.sh)"
          # Tạo liên kết để Makefile không bị báo lỗi thiếu file
          ln -s /opt/theos ~/theos || true 

      - name: Build Package
        run: |
          export THEOS=/opt/theos
          make package FINALPACKAGE=1
