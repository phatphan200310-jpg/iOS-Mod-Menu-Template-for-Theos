name: Build và Đóng gói
on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Theos
        run: |
          sudo apt-get install fakeroot
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/sdks/master/install.sh)"
      - name: Build Package
        run: |
          make package FINALPACKAGE=1
